# タグ (v1.0.0 など) を push すると Windows 用ポータブル exe をビルドして
# GitHub Release に添付する。手動実行 (workflow_dispatch) も可能。
name: Build Windows exe

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: DaraskNovelEngine-win
          path: dist/*.exe

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
